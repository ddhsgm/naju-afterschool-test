<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나주중앙초 방과후 신청</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Naju Jungang Elementary School</p>
        <h1>방과후학교 수강신청</h1>
        <p class="hero-text">
          학년, 반, 이름, 대표 연락처로 로그인한 뒤 희망 강좌를 고르면 오른쪽 주간 시간표에 바로 반영됩니다.
          같은 요일 같은 부 시간이 겹치면 선택이 자동으로 막힙니다.
        </p>
      </div>
      <div class="hero-card">
        <div class="hero-stat">
          <strong id="studentCount">-</strong>
          <span>로그인 가능 학생</span>
        </div>
        <div class="hero-stat">
          <strong>1부~4부</strong>
          <span>40분 단위 시간표</span>
        </div>
      </div>
    </header>

    <main id="appRoot" class="app-root"></main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
